<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<title>Visualización 3D de Chasis Automotriz</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
text-align:center;
}

h1{
margin-top:15px;
font-size:28px;
letter-spacing:1px;
}

p{
color:#cbd5f5;
}

model-viewer{
width:100%;
height:85vh;
background-color:#020617;
}

.footer{
font-size:13px;
color:#94a3b8;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>Visualización 3D de Chasis Automotriz</h1>
<p>Modelo interactivo de ingeniería</p>

<model-viewer
src="chasis.glb"
alt="Chasis automotriz 3D"

camera-controls
touch-action="pan-y"

orientation="-90deg 0deg 0deg"

camera-orbit="45deg 60deg 8m"

min-camera-orbit="auto auto 3m"
max-camera-orbit="auto auto 25m"

field-of-view="35deg"

shadow-intensity="1"
shadow-softness="1"

interaction-prompt="auto"

environment-image="neutral"

ar
ar-modes="scene-viewer webxr quick-look">

</model-viewer>

<div class="footer">
Proyecto de visualización 3D automotriz
</div>

</body>
</html>
