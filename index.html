<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<title>Chasis Automotriz 3D</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: linear-gradient(180deg,#0f172a,#020617);
color:white;
text-align:center;
}

h1{
margin-top:15px;
font-size:28px;
}

p{
color:#cbd5f5;
}

model-viewer{
width:100%;
height:85vh;
background-color:#020617;
}

.footer{
font-size:13px;
color:#94a3b8;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>Visualización 3D de Chasis Automotriz</h1>
<p>Proyecto de ingeniería – Modelo interactivo</p>

<model-viewer
src="chasis.glb"
alt="Chasis automotriz"

camera-controls

ar
ar-modes="scene-viewer webxr quick-look"

orientation="90deg 0deg 0deg"

scale="-1 1 1"

camera-orbit="45deg 65deg 6m"

min-camera-orbit="auto auto 2m"
max-camera-orbit="auto auto 20m"

field-of-view="30deg"

shadow-intensity="1"

interaction-prompt="auto"

environment-image="neutral">

</model-viewer>

<div class="footer">
Visualización interactiva con WebXR
</div>

</body>
</html>
