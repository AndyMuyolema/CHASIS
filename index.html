<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Visor 3D de Chasis Automotriz</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#020617;
font-family:Arial;
color:white;
overflow:hidden;
}

header{
position:absolute;
top:0;
width:100%;
text-align:center;
padding:12px;
background:#0f172a;
font-size:20px;
z-index:10;
}

model-viewer{
width:100%;
height:100vh;
background:#000;
}

/* botones inferiores */

.panel{

position:absolute;

bottom:20px;

width:100%;

text-align:center;

}

.panel button{

background:#1e293b;
border:none;

color:white;

padding:10px 16px;

margin:6px;

border-radius:6px;

cursor:pointer;

font-size:14px;

}

.panel button:hover{

background:#334155;

}

</style>

</head>

<body>

<header>

Visor 3D de Chasis Automotriz

</header>

<model-viewer

id="visor"

src="chasis.glb"

alt="Chasis Automotriz"

camera-controls

scale="0.05 0.05 0.05"

orientation="-90deg 0deg 0deg"

camera-target="auto auto auto"

camera-orbit="45deg 65deg 120%"

min-camera-orbit="auto auto 50%"

max-camera-orbit="auto auto 500%"

field-of-view="35deg"

interaction-prompt="none"

shadow-intensity="1"

environment-image="neutral"

ar
ar-modes="scene-viewer webxr quick-look">

</model-viewer>

<div class="panel">

<button onclick="vistaFrontal()">Vista frontal</button>

<button onclick="vistaLateral()">Vista lateral</button>

<button onclick="vistaSuperior()">Vista superior</button>

<button onclick="vistaEsquina()">Vista esquina</button>

<button onclick="centrar()">Centrar</button>

</div>

<script>

const visor = document.getElementById("visor")

function vistaFrontal(){

visor.cameraOrbit = "0deg 90deg 120%"

}

function vistaLateral(){

visor.cameraOrbit = "90deg 90deg 120%"

}

function vistaSuperior(){

visor.cameraOrbit = "0deg 5deg 120%"

}

function vistaEsquina(){

visor.cameraOrbit = "45deg 60deg 120%"

}

function centrar(){

visor.cameraOrbit = "45deg 65deg 120%"

}

</script>

</body>

</html>
