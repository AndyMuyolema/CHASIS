<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Modelo 3D Automotriz</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
background-color:#2c2c2c;
color:white;
font-family:Arial;
text-align:center;
}
</style>

</head>

<body>

<h1>Modelo 3D del Chasis</h1>

<model-viewer
src="chasis.glb"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate
style="width:100%; height:500px;">
</model-viewer>

</body>
</html>
