<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visor 3D Chasis UPS</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#020617;
color:white;
}

#renderCanvas{
width:100vw;
height:100vh;
display:block;
touch-action:none;
}

.topbar{
position:absolute;
top:0;
left:0;
right:0;
height:60px;
display:flex;
align-items:center;
gap:10px;
padding-left:20px;
background:#0f172a;
z-index:10;
}

.topbar img{
height:40px;
}

.panel{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
background:#0f172acc;
padding:10px;
border-radius:10px;
}

button{
padding:8px 14px;
background:#1e293b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#334155;
}

.loader{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
align-items:center;
justify-content:center;
background:#020617;
font-size:20px;
}

</style>
</head>

<body>

<div class="topbar">

<img src="logo-ups.png">

<h3>Visor 3D de Chasis</h3>

</div>

<canvas id="renderCanvas"></canvas>

<model-viewer
id="arViewer"
src="Chasis2.0.glb"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
style="width:1px;height:1px;opacity:0;">
</model-viewer>

<div class="panel">

<button onclick="fitModel()">Centrar</button>

<button onclick="zoomOut()">Alejar</button>

<button onclick="openAR()">AR</button>

</div>

<div id="loader" class="loader">

Cargando modelo...

</div>

<script>

const canvas = document.getElementById("renderCanvas")

const engine = new BABYLON.Engine(canvas,true)

let scene
let camera
let rootMesh

let modelCenter = BABYLON.Vector3.Zero()

let modelRadius = 1

function createScene(){

scene = new BABYLON.Scene(engine)

scene.clearColor = new BABYLON.Color4(0.02,0.04,0.08,1)

camera = new BABYLON.ArcRotateCamera(

"camera",

BABYLON.Tools.ToRadians(45),

BABYLON.Tools.ToRadians(60),

10,

BABYLON.Vector3.Zero(),

scene

)

camera.attachControl(canvas,true)

camera.inertia = 0

camera.angularSensibilityX = 4200
camera.angularSensibilityY = 4200

camera.panningSensibility = 180

camera.wheelDeltaPercentage = 0.004
camera.pinchDeltaPercentage = 0.004

camera.lowerRadiusLimit = 0.5
camera.upperRadiusLimit = 100

camera.lowerBetaLimit = 0.03
camera.upperBetaLimit = Math.PI - 0.03

const light = new BABYLON.HemisphericLight(

"light",

new BABYLON.Vector3(0,1,0),

scene

)

light.intensity = 1

loadModel()

return scene

}

async function loadModel(){

try{

const result = await BABYLON.SceneLoader.ImportMeshAsync(

"",

"./",

"Chasis2.0.glb",

scene

)

rootMesh = new BABYLON.TransformNode("root",scene)

result.meshes.forEach(m=>{

if(m instanceof BABYLON.Mesh){

m.parent = rootMesh

}

})

scene.executeWhenReady(()=>{

calculateBounds()

fitModel()

document.getElementById("loader").style.display="none"

})

}

catch(e){

console.error(e)

document.getElementById("loader").innerText="Error cargando modelo"

}

}

function calculateBounds(){

let min = new BABYLON.Vector3(Number.MAX_VALUE,Number.MAX_VALUE,Number.MAX_VALUE)

let max = new BABYLON.Vector3(-Number.MAX_VALUE,-Number.MAX_VALUE,-Number.MAX_VALUE)

rootMesh.getChildMeshes().forEach(mesh=>{

const b = mesh.getBoundingInfo()

min = BABYLON.Vector3.Minimize(min,b.boundingBox.minimumWorld)

max = BABYLON.Vector3.Maximize(max,b.boundingBox.maximumWorld)

})

modelCenter = min.add(max).scale(0.5)

const size = max.subtract(min)

modelRadius = Math.max(size.x,size.y,size.z)

camera.target = modelCenter.clone()

}

function fitModel(){

camera.alpha = BABYLON.Tools.ToRadians(45)

camera.beta = BABYLON.Tools.ToRadians(60)

camera.radius = Math.max(modelRadius*2.2,8)

camera.target = modelCenter.clone()

}

function zoomOut(){

camera.radius = Math.min(modelRadius*3.5,80)

}

function openAR(){

const viewer = document.getElementById("arViewer")

if(viewer.canActivateAR){

viewer.activateAR()

}

else{

alert("AR disponible solo en celular compatible")

}

}

createScene()

engine.runRenderLoop(()=>{

scene.render()

})

window.addEventListener("resize",()=>{

engine.resize()

})

</script>

</body>
</html>
