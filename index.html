<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<title>Visor de Chasis Automotriz</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:10px;
background:#020617;
text-align:center;
font-size:20px;
}

#viewer{
width:100%;
height:80vh;
background:#000;
}

.panel{
display:flex;
flex-wrap:wrap;
justify-content:center;
background:#020617;
padding:10px;
}

button{
margin:5px;
padding:10px 14px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#334155;
}

</style>

</head>

<body>

<header>Visor 3D de Chasis Automotriz</header>

<model-viewer
id="viewer"
src="chasis.glb"
alt="Modelo 3D"

camera-controls
orientation="-90deg 0deg 0deg"

camera-orbit="30deg 75deg 10m"

shadow-intensity="1"

environment-image="neutral"

interaction-prompt="auto"

ar
ar-modes="scene-viewer webxr quick-look">

</model-viewer>

<div class="panel">

<button onclick="frontal()">Vista frontal</button> <button onclick="lateral()">Vista lateral</button> <button onclick="superior()">Vista superior</button> <button onclick="centrar()">Centrar</button> <button onclick="rotar()">Auto rotar</button>

</div>

<script>

const visor = document.querySelector("#viewer")

function frontal(){
visor.cameraOrbit = "0deg 75deg 10m"
}

function lateral(){
visor.cameraOrbit = "90deg 75deg 10m"
}

function superior(){
visor.cameraOrbit = "0deg 10deg 10m"
}

function centrar(){
visor.cameraOrbit = "30deg 75deg 10m"
}

function rotar(){
visor.autoRotate = true
}

</script>

</body>
</html>
