<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor 3D Profesional - Chasis</title>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

  <style>
    :root{
      --bg1:#020617;
      --bg2:#0f172a;
      --panel:#0b1220dd;
      --line:#334155;
      --text:#e5eefc;
      --muted:#9fb3d1;
      --btn:#1e293b;
      --btn-hover:#334155;
    }

    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,var(--bg2),var(--bg1));
      color:var(--text);
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
    }

    #renderCanvas{
      width:100%;
      height:100%;
      touch-action:none;
      display:block;
      background:#000;
    }

    .topbar{
      position:absolute;
      top:0;
      left:0;
      right:0;
      z-index:20;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 14px;
      background:linear-gradient(180deg,#0b1630ee,#0b1630cc);
      border-bottom:1px solid #1e293b;
      backdrop-filter:blur(8px);
    }

    .title-wrap{
      min-width:0;
    }

    .title{
      margin:0;
      font-size:20px;
      line-height:1.1;
    }

    .subtitle{
      margin:4px 0 0;
      font-size:12px;
      color:var(--muted);
    }

    .panel{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:16px;
      z-index:20;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:8px;
      padding:10px;
      width:min(95vw,1000px);
      border-radius:16px;
      background:var(--panel);
      border:1px solid #23324b;
      backdrop-filter:blur(8px);
    }

    button{
      border:none;
      border-radius:10px;
      padding:10px 14px;
      background:var(--btn);
      color:white;
      cursor:pointer;
      font-size:14px;
      border:1px solid #334155;
    }

    button:hover{
      background:var(--btn-hover);
    }

    .axes{
      position:absolute;
      left:14px;
      bottom:16px;
      z-index:20;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      padding:10px;
      border-radius:14px;
      background:var(--panel);
      border:1px solid #23324b;
      backdrop-filter:blur(8px);
      width:110px;
    }

    .axes-title{
      grid-column:1 / -1;
      text-align:center;
      font-size:12px;
      color:var(--muted);
      margin-bottom:2px;
    }

    .axis-x{ background:#7f1d1d; }
    .axis-xn{ background:#991b1b; }
    .axis-y{ background:#14532d; }
    .axis-yn{ background:#166534; }
    .axis-z{ background:#1d4ed8; }
    .axis-zn{ background:#1e40af; }

    .status{
      position:absolute;
      right:14px;
      bottom:16px;
      z-index:20;
      max-width:240px;
      padding:10px 12px;
      border-radius:14px;
      background:var(--panel);
      border:1px solid #23324b;
      color:var(--muted);
      font-size:12px;
      line-height:1.35;
      backdrop-filter:blur(8px);
    }

    .viewcube{
      position:absolute;
      top:76px;
      right:14px;
      z-index:20;
      width:170px;
      padding:10px;
      border-radius:14px;
      background:var(--panel);
      border:1px solid #23324b;
      backdrop-filter:blur(8px);
    }

    .viewcube-title{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .cube-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:6px;
    }

    .cube-grid button{
      padding:10px 8px;
      font-size:12px;
    }

    .loader{
      position:absolute;
      inset:0;
      z-index:25;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(2,6,23,.82);
      color:#fff;
      font-size:18px;
      letter-spacing:.3px;
    }

    @media (max-width: 900px){
      .topbar{
        padding:10px 12px;
      }

      .title{
        font-size:17px;
      }

      .viewcube{
        width:145px;
        top:72px;
        right:10px;
      }

      .cube-grid button{
        font-size:11px;
        padding:9px 6px;
      }

      .axes{
        left:10px;
        bottom:92px;
      }

      .status{
        display:none;
      }

      .panel{
        bottom:12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1 class="title">Visor 3D Profesional de Chasis</h1>
        <div class="subtitle">Babylon.js · control libre · vistas rápidas · mejor encuadre</div>
      </div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <div class="viewcube">
      <div class="viewcube-title">Vistas</div>
      <div class="cube-grid">
        <button onclick="setTopView()">TOP</button>
        <button onclick="setFrontView()">FRONT</button>
        <button onclick="setRightView()">RIGHT</button>

        <button onclick="setLeftView()">LEFT</button>
        <button onclick="setIsoView()">ISO</button>
        <button onclick="setBackView()">BACK</button>

        <button onclick="setBottomView()">BOTTOM</button>
        <button onclick="fitModel()">FIT</button>
        <button onclick="setFreeView()">FREE</button>
      </div>
    </div>

    <div class="axes">
      <div class="axes-title">Ejes</div>
      <button class="axis-x" onclick="axisView('x')">X</button>
      <button class="axis-xn" onclick="axisView('-x')">-X</button>
      <button class="axis-y" onclick="axisView('y')">Y</button>
      <button class="axis-yn" onclick="axisView('-y')">-Y</button>
      <button class="axis-z" onclick="axisView('z')">Z</button>
      <button class="axis-zn" onclick="axisView('-z')">-Z</button>
    </div>

    <div class="panel">
      <button onclick="setFrontView()">Vista frontal</button>
      <button onclick="setLeftView()">Vista izquierda</button>
      <button onclick="setRightView()">Vista derecha</button>
      <button onclick="setTopView()">Vista superior</button>
      <button onclick="setIsoView()">Vista esquina</button>
      <button onclick="fitModel()">Centrar</button>
      <button onclick="zoomFar()">Alejar más</button>
    </div>

    <div class="status">
      1 dedo: rotar<br>
      2 dedos: mover y zoom<br>
      Rueda del mouse: zoom<br>
      El modelo se centra automáticamente al cargar
    </div>

    <div class="loader" id="loader">Cargando modelo 3D...</div>
  </div>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });

    let scene, camera, rootMesh = null;
    let modelMin = null, modelMax = null, modelCenter = null, modelRadius = 1;

    const createScene = async function () {
      scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0, 0, 0, 1);

      // Cámara tipo CAD
      camera = new BABYLON.ArcRotateCamera(
        "camera",
        BABYLON.Tools.ToRadians(45),
        BABYLON.Tools.ToRadians(65),
        20,
        BABYLON.Vector3.Zero(),
        scene
      );

      camera.attachControl(canvas, true);

      // Movimiento libre
      camera.wheelDeltaPercentage = 0.01;
      camera.pinchDeltaPercentage = 0.01;
      camera.panningSensibility = 80;
      camera.angularSensibilityX = 700;
      camera.angularSensibilityY = 700;

      // Sin límites molestos
      camera.lowerRadiusLimit = 0.1;
      camera.upperRadiusLimit = 100000;
      camera.lowerBetaLimit = 0.01;
      camera.upperBetaLimit = Math.PI - 0.01;

      camera.useBouncingBehavior = false;
      camera.useAutoRotationBehavior = false;

      // Luces
      const hemi = new BABYLON.HemisphericLight(
        "hemi",
        new BABYLON.Vector3(0, 1, 0),
        scene
      );
      hemi.intensity = 0.95;

      const dir = new BABYLON.DirectionalLight(
        "dir",
        new BABYLON.Vector3(-1, -2, -1),
        scene
      );
      dir.position = new BABYLON.Vector3(20, 40, 20);
      dir.intensity = 1.1;

      const dir2 = new BABYLON.DirectionalLight(
        "dir2",
        new BABYLON.Vector3(1, -1, 1),
        scene
      );
      dir2.position = new BABYLON.Vector3(-20, 30, -20);
      dir2.intensity = 0.7;

      // Entorno
      scene.environmentTexture = BABYLON.CubeTexture.CreateFromPrefilteredData(
        "https://playground.babylonjs.com/textures/environment.env",
        scene
      );
      scene.environmentIntensity = 1.0;
      scene.createDefaultSkybox(scene.environmentTexture, true, 1000, 0.25);

      // Suelo suave
      const ground = BABYLON.MeshBuilder.CreateGround("ground", {
        width: 200,
        height: 200
      }, scene);

      const groundMat = new BABYLON.PBRMaterial("groundMat", scene);
      groundMat.albedoColor = new BABYLON.Color3(0.08, 0.10, 0.14);
      groundMat.roughness = 0.95;
      groundMat.metallic = 0.05;
      ground.material = groundMat;
      ground.position.y = -0.02;

      // Ejes visuales
      createAxes(3);

      // Carga modelo
      await BABYLON.SceneLoader.ImportMeshAsync("", "./", "chasis.glb", scene).then((result) => {
        const meshes = result.meshes.filter(m => m.name !== "__root__");

        if (!meshes.length) {
          document.getElementById("loader").innerText = "No se encontró geometría en chasis.glb";
          return;
        }

        rootMesh = new BABYLON.TransformNode("rootModel", scene);

        meshes.forEach(mesh => {
          if (mesh instanceof BABYLON.Mesh) {
            mesh.parent = rootMesh;
            mesh.receiveShadows = true;
          }
        });

        // Rotación para modelo de CAD
        rootMesh.rotation.x = -Math.PI / 2;

        scene.executeWhenReady(() => {
          updateBounds();
          fitModel();
          document.getElementById("loader").style.display = "none";
        });
      }).catch((err) => {
        console.error(err);
        document.getElementById("loader").innerText = "Error cargando chasis.glb";
      });

      return scene;
    };

    function createAxes(size) {
      const axisX = BABYLON.MeshBuilder.CreateLines("axisX", {
        points: [BABYLON.Vector3.Zero(), new BABYLON.Vector3(size, 0, 0)]
      }, scene);
      axisX.color = new BABYLON.Color3(1, 0, 0);

      const axisY = BABYLON.MeshBuilder.CreateLines("axisY", {
        points: [BABYLON.Vector3.Zero(), new BABYLON.Vector3(0, size, 0)]
      }, scene);
      axisY.color = new BABYLON.Color3(0, 1, 0);

      const axisZ = BABYLON.MeshBuilder.CreateLines("axisZ", {
        points: [BABYLON.Vector3.Zero(), new BABYLON.Vector3(0, 0, size)]
      }, scene);
      axisZ.color = new BABYLON.Color3(0, 0.7, 1);
    }

    function updateBounds() {
      if (!rootMesh) return;

      let min = new BABYLON.Vector3(Number.MAX_VALUE, Number.MAX_VALUE, Number.MAX_VALUE);
      let max = new BABYLON.Vector3(-Number.MAX_VALUE, -Number.MAX_VALUE, -Number.MAX_VALUE);

      rootMesh.getChildMeshes().forEach(mesh => {
        const info = mesh.getBoundingInfo();
        const bmin = info.boundingBox.minimumWorld;
        const bmax = info.boundingBox.maximumWorld;

        min = BABYLON.Vector3.Minimize(min, bmin);
        max = BABYLON.Vector3.Maximize(max, bmax);
      });

      modelMin = min;
      modelMax = max;
      modelCenter = min.add(max).scale(0.5);

      const extent = max.subtract(min);
      modelRadius = Math.max(extent.x, extent.y, extent.z) * 0.9;
      if (modelRadius < 0.1) modelRadius = 1;

      camera.target = modelCenter.clone();
    }

    function animateCamera(alpha, beta, radius) {
      BABYLON.Animation.CreateAndStartAnimation(
        "camAlpha",
        camera,
        "alpha",
        60,
        18,
        camera.alpha,
        alpha,
        0,
        new BABYLON.CubicEase()
      );

      BABYLON.Animation.CreateAndStartAnimation(
        "camBeta",
        camera,
        "beta",
        60,
        18,
        camera.beta,
        beta,
        0,
        new BABYLON.CubicEase()
      );

      BABYLON.Animation.CreateAndStartAnimation(
        "camRadius",
        camera,
        "radius",
        60,
        18,
        camera.radius,
        radius,
        0,
        new BABYLON.CubicEase()
      );

      BABYLON.Animation.CreateAndStartAnimation(
        "camTarget",
        camera,
        "target",
        60,
        18,
        camera.target.clone(),
        modelCenter.clone(),
        0,
        new BABYLON.CubicEase()
      );
    }

    function fitModel() {
      if (!modelCenter) return;
      updateBounds();
      const radius = modelRadius * 2.4;
      animateCamera(
        BABYLON.Tools.ToRadians(45),
        BABYLON.Tools.ToRadians(65),
        radius
      );
    }

    function zoomFar() {
      if (!modelCenter) return;
      animateCamera(camera.alpha, camera.beta, modelRadius * 4.8);
    }

    function setFrontView() {
      animateCamera(BABYLON.Tools.ToRadians(0), BABYLON.Tools.ToRadians(90), modelRadius * 2.2);
    }

    function setBackView() {
      animateCamera(BABYLON.Tools.ToRadians(180), BABYLON.Tools.ToRadians(90), modelRadius * 2.2);
    }

    function setLeftView() {
      animateCamera(BABYLON.Tools.ToRadians(-90), BABYLON.Tools.ToRadians(90), modelRadius * 2.2);
    }

    function setRightView() {
      animateCamera(BABYLON.Tools.ToRadians(90), BABYLON.Tools.ToRadians(90), modelRadius * 2.2);
    }

    function setTopView() {
      animateCamera(BABYLON.Tools.ToRadians(0), BABYLON.Tools.ToRadians(10), modelRadius * 2.8);
    }

    function setBottomView() {
      animateCamera(BABYLON.Tools.ToRadians(0), BABYLON.Tools.ToRadians(170), modelRadius * 2.8);
    }

    function setIsoView() {
      animateCamera(BABYLON.Tools.ToRadians(45), BABYLON.Tools.ToRadians(60), modelRadius * 2.4);
    }

    function setFreeView() {
      animateCamera(BABYLON.Tools.ToRadians(30), BABYLON.Tools.ToRadians(75), modelRadius * 2.6);
    }

    function axisView(axis) {
      if (axis === "x") setRightView();
      if (axis === "-x") setLeftView();
      if (axis === "y") setTopView();
      if (axis === "-y") setBottomView();
      if (axis === "z") setFrontView();
      if (axis === "-z") setBackView();
    }

    createScene().then((scene) => {
      engine.runRenderLoop(() => {
        scene.render();
      });
    });

    window.addEventListener("resize", () => {
      engine.resize();
    });
  </script>
</body>
</html>
