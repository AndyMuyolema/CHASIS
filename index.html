<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<title>Visor de Chasis Automotriz</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

model-viewer{
width:100%;
height:100vh;
background:#020617;
}

/* Cubo de vistas */

.cubo{
position:absolute;
top:20px;
right:20px;
display:grid;
grid-template-columns:40px 40px 40px;
grid-template-rows:40px 40px 40px;
gap:2px;
}

.cubo button{
background:#1e293b;
border:none;
color:white;
cursor:pointer;
font-size:12px;
}

.cubo button:hover{
background:#334155;
}

</style>

</head>

<body>

<model-viewer
id="visor"
src="chasis.glb"

camera-controls

orientation="-90deg 0deg 0deg"

camera-orbit="35deg 70deg 12m"

shadow-intensity="1"

environment-image="neutral"

interaction-prompt="none">

</model-viewer>

<div class="cubo">

<button onclick="vistaSuperior()">↑</button> <button onclick="vistaSuperior()">TOP</button> <button onclick="vistaSuperior()">↑</button>

<button onclick="vistaIzquierda()">L</button> <button onclick="centrar()">C</button> <button onclick="vistaDerecha()">R</button>

<button onclick="vistaFrontal()">F</button> <button onclick="vistaInferior()">B</button> <button onclick="vistaTrasera()">BK</button>

</div>

<script>

const visor = document.getElementById("visor")

function vistaFrontal(){
visor.cameraOrbit = "0deg 75deg 12m"
}

function vistaTrasera(){
visor.cameraOrbit = "180deg 75deg 12m"
}

function vistaDerecha(){
visor.cameraOrbit = "90deg 75deg 12m"
}

function vistaIzquierda(){
visor.cameraOrbit = "-90deg 75deg 12m"
}

function vistaSuperior(){
visor.cameraOrbit = "0deg 10deg 12m"
}

function vistaInferior(){
visor.cameraOrbit = "0deg 170deg 12m"
}

function centrar(){
visor.cameraOrbit = "35deg 70deg 12m"
}

</script>

</body>
</html>
