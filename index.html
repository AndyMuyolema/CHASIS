<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<title>Chasis Automotriz 3D</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: linear-gradient(180deg,#0f172a,#020617);
color:white;
text-align:center;
}

h1{
margin-top:20px;
font-size:32px;
letter-spacing:1px;
}

p{
color:#cbd5f5;
margin-bottom:10px;
}

model-viewer{
width:100%;
height:80vh;
background-color:#020617;
}

.footer{
margin:15px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<h1>Visualización 3D de Chasis Automotriz</h1>
<p>Proyecto de ingeniería – Modelo interactivo</p>

<model-viewer
src="chasis.glb"
alt="Chasis automotriz 3D"
ar
ar-modes="scene-viewer webxr quick-look"

camera-controls
auto-rotate
rotation-per-second="15deg"

orientation="90deg 0deg 0deg"

shadow-intensity="1"
shadow-softness="1"

environment-image="neutral"

interaction-prompt="auto"

min-camera-orbit="auto auto 0.5m"
max-camera-orbit="auto auto 15m"

style="width:100%; height:80vh;">

</model-viewer>

<div class="footer">
Visualización interactiva desarrollada con tecnología WebXR
</div>

</body>
</html>
