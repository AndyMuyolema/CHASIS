<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visor 3D Profesional de Chasis</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<style>

html,body{
width:100%;
height:100%;
margin:0;
overflow:hidden;
font-family:Arial;
background:#030712;
}

#renderCanvas{
width:100%;
height:100%;
touch-action:none;
}

.panel{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
padding:10px;
border-radius:12px;
}

button{
padding:8px 12px;
margin:4px;
background:#1f2937;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#374151;
}

.cube{
position:absolute;
top:80px;
right:20px;
width:90px;
height:90px;
transform-style:preserve-3d;
transform:rotateX(-25deg) rotateY(35deg);
}

.face{
position:absolute;
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
color:white;
cursor:pointer;
font-size:12px;
border:1px solid rgba(255,255,255,.2);
}

.front{background:#2563eb; transform:translateZ(45px);}
.back{background:#64748b; transform:rotateY(180deg) translateZ(45px);}
.left{background:#ef4444; transform:rotateY(-90deg) translateZ(45px);}
.right{background:#22c55e; transform:rotateY(90deg) translateZ(45px);}
.top{background:#0ea5e9; transform:rotateX(90deg) translateZ(45px);}
.bottom{background:#9333ea; transform:rotateX(-90deg) translateZ(45px);}

.axes{
position:absolute;
left:20px;
bottom:20px;
background:#111827;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<canvas id="renderCanvas"></canvas>

<div class="cube" id="cube">

<div class="face front" onclick="viewFront()">FRONT</div>
<div class="face back" onclick="viewBack()">BACK</div>
<div class="face left" onclick="viewLeft()">LEFT</div>
<div class="face right" onclick="viewRight()">RIGHT</div>
<div class="face top" onclick="viewTop()">TOP</div>
<div class="face bottom" onclick="viewBottom()">BOTTOM</div>

</div>

<div class="panel">

<button onclick="viewFront()">Vista frontal</button>
<button onclick="viewLeft()">Vista izquierda</button>
<button onclick="viewRight()">Vista derecha</button>
<button onclick="viewTop()">Vista superior</button>
<button onclick="viewIso()">Vista esquina</button>
<button onclick="fitModel()">Centrar</button>
<button onclick="zoomFar()">Alejar</button>

</div>

<div class="axes">

<button onclick="axisView('x')">X</button>
<button onclick="axisView('-x')">-X</button>
<button onclick="axisView('y')">Y</button>
<button onclick="axisView('-y')">-Y</button>
<button onclick="axisView('z')">Z</button>
<button onclick="axisView('-z')">-Z</button>

</div>

<script>

const canvas = document.getElementById("renderCanvas")
const engine = new BABYLON.Engine(canvas,true)

let scene
let camera
let rootMesh
let center
let radius

async function createScene(){

scene=new BABYLON.Scene(engine)

camera=new BABYLON.ArcRotateCamera(
"camera",
BABYLON.Tools.ToRadians(45),
BABYLON.Tools.ToRadians(60),
10,
BABYLON.Vector3.Zero(),
scene
)

camera.attachControl(canvas,true)

camera.inertia=0
camera.angularSensibilityX=3000
camera.angularSensibilityY=3000
camera.panningSensibility=180
camera.wheelDeltaPercentage=0.003
camera.pinchDeltaPercentage=0.003

camera.lowerRadiusLimit=0.1
camera.upperRadiusLimit=100000

camera.lowerBetaLimit=0.05
camera.upperBetaLimit=Math.PI-0.05

new BABYLON.HemisphericLight(
"light",
new BABYLON.Vector3(0,1,0),
scene
)

const result=await BABYLON.SceneLoader.ImportMeshAsync(
"",
"./",
"chasis.glb",
scene
)

rootMesh=new BABYLON.TransformNode("root",scene)

result.meshes.forEach(m=>{
if(m.name!=="__root__") m.parent=rootMesh
})

rootMesh.rotation.x=-Math.PI/2

scene.executeWhenReady(()=>{

const bounds=rootMesh.getHierarchyBoundingVectors()

center=bounds.min.add(bounds.max).scale(.5)

const size=bounds.max.subtract(bounds.min)

radius=Math.max(size.x,size.y,size.z)

camera.target=center

fitModel()

})

return scene

}

function animate(alpha,beta,dist){

BABYLON.Animation.CreateAndStartAnimation(
"a",
camera,
"alpha",
60,
15,
camera.alpha,
alpha,
0
)

BABYLON.Animation.CreateAndStartAnimation(
"b",
camera,
"beta",
60,
15,
camera.beta,
beta,
0
)

BABYLON.Animation.CreateAndStartAnimation(
"r",
camera,
"radius",
60,
15,
camera.radius,
dist,
0
)

camera.target=center

}

function fitModel(){
animate(
BABYLON.Tools.ToRadians(45),
BABYLON.Tools.ToRadians(60),
radius*2
)
}

function zoomFar(){
animate(camera.alpha,camera.beta,radius*5)
}

function viewFront(){
animate(0,Math.PI/2,radius*1.6)
}

function viewBack(){
animate(Math.PI,Math.PI/2,radius*1.6)
}

function viewLeft(){
animate(-Math.PI/2,Math.PI/2,radius*1.6)
}

function viewRight(){
animate(Math.PI/2,Math.PI/2,radius*1.6)
}

function viewTop(){
animate(0,0.1,radius*2)
}

function viewBottom(){
animate(0,Math.PI-0.1,radius*2)
}

function viewIso(){
animate(Math.PI/4,Math.PI/3,radius*1.8)
}

function axisView(a){

if(a=="x") viewRight()
if(a=="-x") viewLeft()

if(a=="y") viewTop()
if(a=="-y") viewBottom()

if(a=="z") viewFront()
if(a=="-z") viewBack()

}

createScene().then(scene=>{
engine.runRenderLoop(()=>{
scene.render()
})
})

window.addEventListener("resize",()=>{
engine.resize()
})

</script>

</body>

</html>
